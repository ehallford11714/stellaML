[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stellaml"
version = "0.1.0"
description = "STELLA lattice-driven agentic ML orchestration harness"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "stellaML Contributors"}]
license = {text = "MIT"}
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"
